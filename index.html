<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video</title>
</head>

<body style="margin:0;background:black;overflow:hidden;cursor:pointer;">

<div id="blackscreen" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:10;
">
</div>

<video id="video"
preload="auto"
style="display:none;width:100vw;height:100vh;object-fit:cover;">
<source src="video.mp4" type="video/mp4">
</video>

<script>

let started = false;
let video = document.getElementById("video");
let black = document.getElementById("blackscreen");

document.addEventListener("click", async function(){

  if(started) return;
  started = true;

  // entrar em fullscreen
  if(document.documentElement.requestFullscreen){
    await document.documentElement.requestFullscreen();
  }

  // manter tela preta por 2 segundos
  setTimeout(function(){

    black.style.display="none";
    video.style.display="block";

    video.play();

  },2000);

});

</script>

</body>
</html>
